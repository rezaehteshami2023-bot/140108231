<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Krackter Anime | گالری شخصیت‌های انیمه</title>

    <link rel="icon" href="ff/download (1).jfif" type="image/jpeg">

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #31145d 0%, #17142d 40%, #080811 100%);
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* ستاره‌ها */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(#ffffff33 1.3px, transparent 1.3px);
            background-size: 35px 35px;
            opacity: .15;
            pointer-events: none;
            z-index: 0;
        }

        /* نور پس‌زمینه */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, #6b3fa055 0%, transparent 45%),
                radial-gradient(circle at 80% 80%, #4d96ff44 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, #ff5f5f22 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(1200px, 92%);
            margin: auto;
            padding: 40px 0 70px;
        }

        h1 {
            text-align: center;
            font-size: 58px;
            font-weight: 900;
            background: linear-gradient(135deg,
                    #ff6b6b,
                    #ffd93d,
                    #6bcb77,
                    #4d96ff,
                    #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGradient 6s infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes titleGradient {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }

        .subtitle {
            margin-top: 15px;
            margin-bottom: 55px;
            text-align: center;
            font-size: 22px;
            font-weight: 300;
            color: #d7d7ea;
            opacity: .9;
        }

        .subtitle span {
            color: #ffd93d;
            font-weight: 700;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            align-items: stretch;
        }

        /* ===========================
           کارت‌های گالری
        ============================ */
        .card {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, .12);
            box-shadow: 0 15px 35px rgba(0, 0, 0, .35);
            transition: transform .45s ease,
                box-shadow .45s ease,
                background .45s ease,
                border-color .45s ease;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, .18),
                    transparent 45%,
                    rgba(255, 255, 255, .05));
            opacity: 0;
            transition: .45s;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.03);
            background: rgba(255, 255, 255, .12);
            border-color: rgba(255, 255, 255, .22);
            box-shadow: 0 28px 60px rgba(0, 0, 0, .55);
        }

        .card:hover::before {
            opacity: 1;
        }

        /* تصویر کارت */
        .card-img-wrap {
            position: relative;
            height: 260px;
            overflow: hidden;
        }

        .card-img-wrap img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform .6s ease,
                filter .4s ease;
        }

        .card:hover img {
            transform: scale(1.08);
            filter: brightness(1.08);
        }

        /* گرادینت پایین تصویر */
        .card-img-wrap::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 45%;
            background: linear-gradient(to top,
                    rgba(0, 0, 0, .75),
                    transparent);
        }

        /* عنوان شخصیت */
        .card h3 {
            padding: 18px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background: rgba(0, 0, 0, .18);
            border-top: 1px solid rgba(255, 255, 255, .05);
            letter-spacing: .3px;
        }

        /* انیمیشن ظاهر شدن */
        .card {
            animation: cardFade .7s ease both;
        }

        .card:nth-child(2) {
            animation-delay: .08s;
        }
        .card:nth-child(3) {
            animation-delay: .16s;
        }
        .card:nth-child(4) {
            animation-delay: .24s;
        }
        .card:nth-child(5) {
            animation-delay: .32s;
        }
        .card:nth-child(6) {
            animation-delay: .40s;
        }

        @keyframes cardFade {
            from {
                opacity: 0;
                transform: translateY(35px) scale(.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* پیام نبود ویدیو */
        .no-video {
            padding: 80px 35px;
            text-align: center;
            border-radius: 30px;
            background: rgba(255, 255, 255, .05);
            border: 1px dashed rgba(255, 255, 255, .12);
            color: #bdbdd8;
            font-size: 22px;
        }

        .no-video span {
            display: block;
            font-size: 70px;
            margin-bottom: 20px;
        }

        /* =======================================
           بخش جزئیات شخصیت
        ======================================== */
        #detail {
            display: none;
            max-width: 1100px;
            margin: 50px auto 0;
            padding: 35px;
            border-radius: 32px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, .12);
            box-shadow: 0 25px 60px rgba(0, 0, 0, .45);
            animation: detailShow .45s ease;
        }

        @keyframes detailShow {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ======================
           ویدیو
        ====================== */
        #videoContainer {
            width: 100%;
            margin-bottom: 30px;
            position: relative;
        }

        #detail video {
            width: 100%;
            height: 700px;
            display: block;
            object-fit: cover;
            border-radius: 22px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, .08);
            box-shadow: 0 12px 35px rgba(0, 0, 0, .45);
        }

        /* وقتی ویدیو مخفی میشه */
        #videoContainer.hidden-video video {
            display: none;
        }

        /* ======================
           متن
        ====================== */
        #detail h2 {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 18px;
            color: #ffffff;
        }

        #detail p {
            font-size: 18px;
            line-height: 2.1;
            color: #d7d7ea;
        }

        /* ======================
           دکمه‌ها
        ====================== */
        .detail-actions {
            margin-top: 35px;
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            cursor: pointer;
            padding: 15px 34px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            transition: .3s;
            color: #fff;
            background: #ff5b5b;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #ff2f2f;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, .10);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, .18);
        }

        .btn-success {
            background: #6bcb77;
        }

        .btn-success:hover {
            background: #4fb85d;
        }

        /* ======================
           صفحه ویدیو (Video Page)
        ====================== */
        #videoPage {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, .92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            animation: videoPageFade .4s ease;
        }

        @keyframes videoPageFade {
            from {
                opacity: 0;
                transform: scale(.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #videoPage .video-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            height: 85vh;
            display: flex;
            flex-direction: column;
        }

        #videoPage .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 18px;
            background: #000;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .7);
        }

        #videoPage .video-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 10px;
            gap: 20px;
            flex-wrap: wrap;
        }

        #videoPage .video-controls .video-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        #videoPage .close-video-btn {
            background: #ff5b5b;
            border: none;
            color: #fff;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
        }

        #videoPage .close-video-btn:hover {
            transform: scale(1.05);
            background: #ff2f2f;
        }

        /* ======================
           موبایل
        ====================== */
        @media(max-width:900px) {
            #detail {
                padding: 25px;
            }
            #detail video {
                height: 420px;
            }
            #videoPage {
                padding: 15px;
            }
            #videoPage .video-wrapper {
                height: 75vh;
            }
        }

        @media(max-width:700px) {
            h1 {
                font-size: 34px;
            }
            .subtitle {
                font-size: 17px;
                margin-bottom: 30px;
            }
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 18px;
            }
            .card-img-wrap {
                height: 200px;
            }
            #detail {
                padding: 20px;
            }
            #detail h2 {
                font-size: 28px;
            }
            #detail p {
                font-size: 16px;
            }
            #detail video {
                height: 280px;
                border-radius: 18px;
            }
            .detail-actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            #videoPage .video-wrapper {
                height: 60vh;
            }
            #videoPage .video-controls .video-title {
                font-size: 17px;
            }
            #videoPage .close-video-btn {
                padding: 10px 25px;
                font-size: 15px;
            }
        }

        @media(max-width:480px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
            .card-img-wrap {
                height: 170px;
            }
            #detail video {
                height: 220px;
            }
            #videoPage .video-wrapper {
                height: 50vh;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>✨ Krackter Anime ✨</h1>

        <p class="subtitle">
            ★ <span>۶</span> شخصیت محبوب انیمه ★
        </p>

        <!-- گالری شخصیت‌ها -->
        <div id="gallery" class="gallery">

            <!-- تانجیرو -->
            <div class="card" onclick="showDetail(0)">
                <div class="card-img-wrap">
                    <img src="ff/tangiro.jpg" alt="تانجیرو کامادو">
                </div>
                <h3>تانجیرو کامادو</h3>
            </div>

            <!-- مدوریا -->
            <div class="card" onclick="showDetail(1)">
                <div class="card-img-wrap">
                    <img src="ff/h(2).jfif" alt="ایزوکو مدوریا">
                </div>
                <h3>ایزوکو مدوریا</h3>
            </div>

            <!-- یوجی -->
            <div class="card" onclick="showDetail(2)">
                <div class="card-img-wrap">
                    <img src="ff/download.jfif" alt="یوجی ایتادوری">
                </div>
                <h3>یوجی ایتادوری</h3>
            </div>

            <!-- هیناتا -->
            <div class="card" onclick="showDetail(3)">
                <div class="card-img-wrap">
                    <img src="ff/images (1).jfif" alt="هیناتا شویو">
                </div>
                <h3>هیناتا شویو</h3>
            </div>

            <!-- ساسوکه -->
            <div class="card" onclick="showDetail(4)">
                <div class="card-img-wrap">
                    <img src="ff/httpsi.pinimg.com736x3d8ce83d8ce84f47b37d76dc4f53fd0b0f79f0.jpg" alt="ساسوکه اوچیها">
                </div>
                <h3>ساسوکه اوچیها</h3>
            </div>

            <!-- گوجو -->
            <div class="card" onclick="showDetail(5)">
                <div class="card-img-wrap">
                    <img src="ff/download (1).jfif" alt="ساتورو گوجو">
                </div>
                <h3>ساتورو گوجو</h3>
            </div>

        </div>

        <!-- بخش نمایش اطلاعات شخصیت -->
        <section id="detail">

            <div id="videoContainer"></div>

            <h2 id="detailTitle"></h2>

            <p id="detailStory"></p>

            <!-- دکمه‌ها -->
            <div class="detail-actions">

                <button class="btn" onclick="backGallery()">
                    🔙 بازگشت به گالری
                </button>

                <button class="btn btn-secondary" onclick="window.scrollTo({top:0,behavior:'smooth'})">
                    ⬆️ ابتدای صفحه
                </button>

                <!-- دکمه جدید: نمایش ویدیو در صفحه جداگانه -->
                <button class="btn btn-success" onclick="openVideoPage()">
                    🎬 نمایش ویدیو بزرگ
                </button>

            </div>

        </section>

    </div>

    <!-- =============================
         صفحه ویدیو (پاپ‌آپ)
    ============================= -->
    <div id="videoPage">

        <div class="video-wrapper">

            <video id="fullVideo" controls autoplay playsInline>
                <source src="" type="video/mp4">
                مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
            </video>

            <div class="video-controls">
                <span class="video-title" id="videoPageTitle">عنوان ویدیو</span>
                <button class="close-video-btn" onclick="closeVideoPage()">
                    ✖ بستن
                </button>
            </div>

        </div>

    </div>

    <script>
        // ========================
        // داده‌های شخصیت‌ها
        // ========================
        const characters = [{
            name: "تانجیرو کامادو",
            image: "ff/tangiro.jpg",
            video: "videos/video_2026-07-01_22-24-08.mp4",
            story: "تانجیرو پس از قتل خانواده‌اش توسط شیاطین، تصمیم می‌گیرد به یک شیطان‌کش تبدیل شود تا خواهرش نزوکو را دوباره به انسان تبدیل کند. او با شجاعت، مهربانی و اراده‌ای مثال‌زدنی در برابر قدرتمندترین شیاطین می‌ایستد."
        }, {
            name: "ایزوکو مدوریا",
            image: "ff/h(2).jfif",
            video: "videos/video_2026-07-01_22-44-42.mp4",
            story: "مدوریا با وجود نداشتن قدرت ذاتی، با تلاش فراوان وارث قدرت One For All شد و مسیر تبدیل شدن به بزرگ‌ترین قهرمان دنیا را آغاز کرد."
        }, {
            name: "یوجی ایتادوری",
            image: "ff/download.jfif",
            video: "videos/video_2026-07-01_23-18-04.mp4",
            story: "یوجی پس از بلعیدن انگشت سوکونا وارد دنیای جوجوتسو شد و با وجود قدرت خارق‌العاده، همیشه برای نجات دیگران می‌جنگد."
        }, {
            name: "هیناتا شویو",
            image: "ff/images (1).jfif",
            video: "videos/video_2026-07-01_22-44-51.mp4",
            story: "هیناتا با وجود قد کوتاهش، با تلاش و پشتکار به یکی از بهترین اسپکرهای والیبال تبدیل شد و الهام‌بخش بسیاری از ورزشکاران است."
        }, {
            name: "ساسوکه اوچیها",
            image: "ff/httpsi.pinimg.com736x3d8ce83d8ce84f47b37d76dc4f53fd0b0f79f0.jpg",
            video: "videos/video_2026-07-01_21-40-20.mp4",
            story: "ساسوکه آخرین بازمانده خاندان اوچیهاست. او برای انتقام قدم در مسیر تاریکی گذاشت اما در نهایت ارزش دوستی و خانواده را درک کرد."
        }, {
            name: "ساتورو گوجو",
            image: "ff/download (1).jfif",
            video: "videos/16277.mp4",
            story: "گوجو قوی‌ترین جادوگر دنیای جوجوتسو است. قدرت خارق‌العاده، شخصیت شوخ‌طبع و حمایت از شاگردانش او را به یکی از محبوب‌ترین شخصیت‌های انیمه تبدیل کرده است."
        }];

        // متغیر برای نگهداری ایندکس شخصیت فعلی
        let currentCharacterIndex = 0;

        // ========================
        // نمایش جزئیات شخصیت
        // ========================
        function showDetail(index) {

            currentCharacterIndex = index;
            const character = characters[index];

            const gallery = document.getElementById("gallery");
            const detail = document.getElementById("detail");

            gallery.style.display = "none";
            detail.style.display = "block";

            document.getElementById("detailTitle").textContent = character.name;
            document.getElementById("detailStory").textContent = character.story;

            const container = document.getElementById("videoContainer");

            // پاک کردن کلاس مخفی شدن
            container.classList.remove("hidden-video");
            container.innerHTML = "";

            const video = document.createElement("video");

            video.src = character.video;

            video.controls = true;

            video.autoplay = true;

            video.playsInline = true;

            video.preload = "metadata";

            video.loop = false;

            video.muted = false;

            video.setAttribute("controlsList", "nodownload");

            video.style.width = "100%";
            video.style.height = "700px";
            video.style.objectFit = "cover";
            video.style.borderRadius = "22px";
            video.style.background = "#000";

            video.onerror = function() {

                container.innerHTML = `
                        <div class="no-video">
                            <span>🎬</span>
                            <h3 style="font-size:28px;margin-bottom:15px;">
                                ویدیو پیدا نشد
                            </h3>
                            <p style="opacity:.8;">
                                فایل ویدیوی این شخصیت در پوشه videos موجود نیست.
                            </p>
                        </div>
                    `;

            };

            container.appendChild(video);

            window.scrollTo({

                top: 0,

                behavior: "smooth"

            });

        }

        // ========================
        // بازگشت به گالری
        // ========================
        function backGallery() {

            const gallery = document.getElementById("gallery");
            const detail = document.getElementById("detail");
            const container = document.getElementById("videoContainer");

            // حذف کلاس مخفی شدن
            container.classList.remove("hidden-video");

            const video = container.querySelector("video");

            if (video) {

                video.pause();

                video.removeAttribute("src");
                video.load();

            }

            container.innerHTML = "";

            detail.style.display = "none";
            gallery.style.display = "grid";

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });

        }

        // ========================
        // باز کردن صفحه ویدیو (پاپ‌آپ)
        // ========================
        function openVideoPage() {

            const character = characters[currentCharacterIndex];

            const videoPage = document.getElementById("videoPage");
            const fullVideo = document.getElementById("fullVideo");
            const titleEl = document.getElementById("videoPageTitle");

            // ---- مخفی کردن ویدیوی داخل بخش جزئیات ----
            const container = document.getElementById("videoContainer");
            const smallVideo = container.querySelector("video");

            if (smallVideo) {
                // توقف ویدیوی کوچک
                smallVideo.pause();
                // مخفی کردن کانتینر ویدیو
                container.classList.add("hidden-video");
            }

            // ---- تنظیم ویدیوی بزرگ ----
            fullVideo.src = character.video;
            fullVideo.load();

            // تنظیم عنوان
            titleEl.textContent = "🎥 " + character.name;

            // نمایش صفحه ویدیو
            videoPage.style.display = "block";

            // قفل کردن اسکرول
            document.body.style.overflow = "hidden";

            // پخش خودکار
            fullVideo.play().catch(() => {});

        }

        // ========================
        // بستن صفحه ویدیو
        // ========================
        function closeVideoPage() {

            const videoPage = document.getElementById("videoPage");
            const fullVideo = document.getElementById("fullVideo");

            // توقف ویدیو
            fullVideo.pause();
            fullVideo.currentTime = 0;
            fullVideo.src = "";

            // مخفی کردن صفحه
            videoPage.style.display = "none";

            // آزاد کردن اسکرول
            document.body.style.overflow = "";

            // ---- نمایش دوباره ویدیوی کوچک ----
            const container = document.getElementById("videoContainer");
            container.classList.remove("hidden-video");

            const smallVideo = container.querySelector("video");
            if (smallVideo) {
                smallVideo.play().catch(() => {});
            }

        }

        // بستن با کلید ESC
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                const videoPage = document.getElementById("videoPage");
                if (videoPage.style.display === "block") {
                    closeVideoPage();
                }
            }
        });

        // بستن با کلیک روی پس‌زمینه
        document.getElementById("videoPage").addEventListener("click", function(e) {
            if (e.target === this) {
                closeVideoPage();
            }
        });

        // ========================
        // بهینه‌سازی
        // ========================

        // توقف ویدیو هنگام خروج از صفحه
        window.addEventListener("beforeunload", () => {

            const video = document.querySelector("#videoContainer video");
            if (video) video.pause();

            const fullVideo = document.getElementById("fullVideo");
            if (fullVideo) fullVideo.pause();

        });

        // توقف ویدیو هنگام تغییر تب مرورگر
        document.addEventListener("visibilitychange", () => {

            const video = document.querySelector("#videoContainer video");
            if (video && document.hidden) video.pause();

            const fullVideo = document.getElementById("fullVideo");
            if (fullVideo && document.hidden) fullVideo.pause();

        });

        // جلوگیری از خطاهای تصاویر
        document.querySelectorAll(".card img").forEach(img => {

            img.onerror = function() {

                this.src =
                    "https://placehold.co/600x800/1b1b2f/ffffff?text=No+Image";

            };

        });
    </script>

</body>

</html>
