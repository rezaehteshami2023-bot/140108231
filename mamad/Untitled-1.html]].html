<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ff/download (1).jfif" type="jfif">
    <title>Krackter Anime | گالری شخصیت‌های انیمه</title>

    <script src="https://cdn.tailwindcss.com">
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 10% 20%, #2b1055, #0f0f1f 60%, #050510);
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* استار پارتکل‌های پس‌زمینه */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(#ffffff22 1.5px, transparent 1.5px);
            background-size: 35px 35px;
            opacity: .12;
            pointer-events: none;
            z-index: 0;
        }

        /* افکت شفق برای جلوه بیشتر */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, #6b3fa0aa 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, #4d96ff44 0%, transparent 50%);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: min(1200px, 92%);
            margin: auto;
            padding: 40px 0 60px;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #6bcb77, #4d96ff, #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s ease-in-out infinite alternate;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(255, 107, 107, 0.2);
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        .subtitle {
            text-align: center;
            color: #cfcfe6;
            margin-top: 12px;
            margin-bottom: 50px;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .subtitle span {
            color: #ffd93d;
            font-weight: 500;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, .06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all .4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            position: relative;
            transform: translateY(0);
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent, rgba(255, 255, 255, 0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, .1);
        }

        .card-img-wrap {
            position: relative;
            overflow: hidden;
            height: 260px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .5s ease;
        }

        .card:hover img {
            transform: scale(1.08);
        }

        .card-img-wrap::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
            pointer-events: none;
        }

        .card h3 {
            padding: 20px 16px 18px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #f0f0ff;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* دیتایل سکشن */
        #detail {
            display: none;
            max-width: 880px;
            margin: 40px auto;
            background: rgba(255, 255, 255, .07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 36px;
            padding: 35px 35px 45px;
            animation: fadeIn .5s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #detail video {
            width: 100%;
            height: 700px;
            display: block;
            object-fit: cover;
            border-radius: 22px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, .08);
            box-shadow: 0 12px 35px rgba(0, 0, 0, .45);
        }

        #detail h2 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, #cfcfe6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        #detail p {
            line-height: 2;
            color: #cfcfe6;
            font-size: 18px;
            font-weight: 300;
            padding: 4px 0;
        }

        .detail-actions {
            display: flex;
            gap: 16px;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        .btn {
            background: #ff5f5f;
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all .3s ease;
            font-size: 17px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 25px -5px rgba(255, 95, 95, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            background: #ff3030;
            box-shadow: 0 12px 30px -5px rgba(255, 48, 48, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
            box-shadow: 0 8px 25px -5px rgba(255, 255, 255, 0.05);
        }

        /* نوتیفیکیشن عدم وجود ویدیو */
        .no-video {
            padding: 80px 35px;

            text-align: center;

            border-radius: 30px;

            background: rgba(255, 255, 255, .05);

            border: 1px dashed rgba(255, 255, 255, .12);

            color: #bdbdd8;

            font-size: 22px;
        }

        .no-video span {
            display: block;

            font-size: 70px;

            margin-bottom: 20px;

        }


        /* ریسپانسیو */
        @media(max-width:700px) {
            h1 {
                font-size: 34px;
            }

            .subtitle {
                font-size: 17px;
                margin-bottom: 30px;
            }

            .card-img-wrap {
                height: 200px;
            }

            .gallery {
                gap: 18px;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }

            #detail {
                padding: 22px 18px 30px;
            }

            #detail h2 {
                font-size: 28px;
            }

            #detail p {
                font-size: 16px;
            }

            .btn {
                padding: 12px 28px;
                font-size: 15px;
                width: 100%;
                justify-content: center;
            }

            .detail-actions {
                flex-direction: column;
            }

            #detail video {
                height: 400px;
            }
        }

        @media(max-width:480px) {
            .card-img-wrap {
                height: 160px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 12px;
            }

            .card h3 {
                font-size: 15px;
                padding: 14px 10px;
            }

            #detail video {
                height: 280px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>✨ Krackter Anime ✨</h1>

        <p class="subtitle">
            ★ <span>۶</span> شخصیت محبوب انیمه‌ای ★
        </p>

        <div id="gallery" class="gallery">

            <!-- کارت ۱ -->
            <div class="card" onclick="showDetail(0)">
                <div class="card-img-wrap">
                    <img src="ff/tangiro.jpg" alt="تانجیرو کامادو">
                </div>
                <h3>تانجیرو کامادو</h3>
            </div>

            <!-- کارت ۲ -->
            <div class="card" onclick="showDetail(1)">
                <div class="card-img-wrap">
                    <img src="ff/h(2).jfif" alt="ایزوکو مدوریا">
                </div>
                <h3>ایزوکو مدوریا</h3>
            </div>

            <!-- کارت ۳ -->
            <div class="card" onclick="showDetail(2)">
                <div class="card-img-wrap">
                    <img src="ff/download.jfif" alt="یوجی ایتادوری">
                </div>
                <h3>یوجی ایتادوری</h3>
            </div>

            <!-- کارت ۴ -->
            <div class="card" onclick="showDetail(3)">
                <div class="card-img-wrap">
                    <img src="ff/images (1).jfif" alt="هیناتا شویو">
                </div>
                <h3>هیناتا شویو</h3>
            </div>

            <!-- کارت ۵ -->
            <div class="card" onclick="showDetail(4)">
                <div class="card-img-wrap">
                    <img src="ff/httpsi.pinimg.com736x3d8ce83d8ce84f47b37d76dc4f53fd0b0f79f0.jpg" alt="ساسوکه اوچیها">
                </div>
                <h3>ساسوکه اوچیها</h3>
            </div>

            <!-- کارت ۶ -->
            <div class="card" onclick="showDetail(5)">
                <div class="card-img-wrap">
                    <img src="ff/download (1).jfif" alt="ساتورو گوجو">
                </div>
                <h3>ساتورو گوجو</h3>
            </div>

        </div>

        <!-- بخش جزئیات -->
        <div id="detail">

            <div id="videoContainer"></div>

            <h2 id="detailTitle"></h2>
            <p id="detailStory"></p>

            <div class="detail-actions">
                <button class="btn" onclick="backGallery()">
                    🔙 بازگشت به گالری
                </button>
                <button class="btn btn-secondary" onclick="backGallery()">
                    ✨ مشاهده کارت‌ها
                </button>
            </div>

        </div>

    </div>

    <script>
        const characters = [{
            name: "تانجیرو کامادو",
            video: "videos/video_2026-07-01_22-24-08.mp4",
            story: "تانجیرو پس از قتل خانواده‌اش توسط شیاطین، تصمیم می‌گیرد به یک شیطان‌کش تبدیل شود تا خواهرش نزوکو را دوباره به انسان تبدیل کند. او با شجاعت، مهربانی و اراده‌ای مثال‌زدنی با قدرتمندترین شیاطین مبارزه می‌کند."
        }, {
            name: "ایزوکو مدوریا",
            video: "videos/video_2026-07-01_22-44-42.mp4",
            story: "مدوریا در ابتدا هیچ قدرتی نداشت اما با تلاش فراوان موفق شد قدرت One For All را به دست آورد و در مسیر تبدیل شدن به بزرگ‌ترین قهرمان جهان قدم بگذارد."
        }, {
            name: "یوجی ایتادوری",
            video: "videos/video_2026-07-01_23-18-04.mp4",
            story: "یوجی ایتادوری پس از بلعیدن انگشت سوکونا وارد دنیای جوجوتسو می‌شود. او با وجود قدرت فوق‌العاده‌اش، قلبی مهربان دارد و برای نجات انسان‌ها با نفرین‌ها مبارزه می‌کند."
        }, {
            name: "هیناتا شویو",
            video: "videos/video_2026-07-01_22-44-51.mp4",
            story: "هیناتا با وجود قد کوتاهش، با پشتکار و پرش‌های خارق‌العاده به یکی از بهترین بازیکنان والیبال تبدیل می‌شود و ثابت می‌کند هیچ رؤیایی دست‌نیافتنی نیست."
        }, {
            name: "ساسوکه اوچیها",
            video: "videos/video_2026-07-01_21-40-20.mp4",
            story: "ساسوکه آخرین بازمانده خاندان اوچیهاست. او برای انتقام از برادرش وارد مسیر تاریکی می‌شود اما در نهایت معنای واقعی دوستی و فداکاری را درک می‌کند."
        }, {
            name: "ساتورو گوجو",
            video: "videos/16277.mp4",
            story: "گوجو قوی‌ترین جادوگر جوجوتسو است. قدرت بی‌نظیر، شخصیت شوخ‌طبع و علاقه او به شاگردانش باعث شده یکی از محبوب‌ترین شخصیت‌های دنیای انیمه باشد."
        }];

        function showDetail(index) {
            const char = characters[index];

            document.getElementById("gallery").style.display = "none";
            document.getElementById("detail").style.display = "block";

            const container = document.getElementById("videoContainer");
            container.innerHTML = '';

            const video = document.createElement('video');
            video.src = char.video;
            video.controls = true;
            video.autoplay = true;
            video.muted = false;
            video.loop = false;
            video.style.width = '100%';
            video.style.height = '700px';
            video.style.objectFit = 'cover';
            video.style.borderRadius = '20px';
            video.style.marginBottom = '28px';
            video.style.background = '#0a0a12';
            video.style.border = '1px solid rgba(255,255,255,0.06)';

            video.onerror = function () {
                this.style.display = 'none';
                const msg = document.createElement('div');
                msg.className = 'no-video';
                msg.innerHTML = `
                        <span>🎬</span>
                        ویدیویی برای این شخصیت موجود نیست
                        <br>
                        <small style="color:#555577;font-size:14px;display:block;margin-top:10px;">${char.video}</small>
                    `;
                container.appendChild(msg);
            };

            container.appendChild(video);

            document.getElementById("detailTitle").innerText = char.name;
            document.getElementById("detailStory").innerText = char.story;

            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function backGallery() {
            document.getElementById("detail").style.display = "none";
            document.getElementById("gallery").style.display = "grid";

            const container = document.getElementById("videoContainer");
            const video = container.querySelector('video');
            if (video) {
                video.pause();
                video.currentTime = 0;
            }

            window.scrollTo({ top: 0, behavior: "smooth" });
        }
    </script>

</body>

</html>
