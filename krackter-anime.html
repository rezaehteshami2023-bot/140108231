<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ff/download (1).jfif" type="jfif">
    <title>Krackter Anime | گالری شخصیت‌های انیمه</title>

    <script src="https://cdn.tailwindcss.com">
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #2b1055, #0f0f1f 60%, #050510);
            color: white;
            overflow-x: hidden;
        }

        .container {
            width: min(1200px, 92%);
            margin: auto;
            padding: 40px 0 60px;
        }

        h1 {
            text-align: center;
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #6bcb77, #4d96ff, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s ease-in-out infinite alternate;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        .subtitle {
            text-align: center;
            color: #cfcfe6;
            margin: 12px 0 30px;
            font-size: 22px;
            font-weight: 300;
            opacity: 0.8;
        }

        .subtitle span {
            color: #ffd93d;
            font-weight: 500;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, .06);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all .3s ease;
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, .12);
        }

        .card-img-wrap {
            position: relative;
            overflow: hidden;
            height: 260px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .4s ease;
        }

        .card:hover img {
            transform: scale(1.06);
        }

        .card-img-wrap::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
            pointer-events: none;
        }

        .card h3 {
            padding: 20px 16px 18px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #f0f0ff;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        #detail {
            display: none;
            max-width: 880px;
            margin: 40px auto;
            background: rgba(255, 255, 255, .07);
            backdrop-filter: blur(24px);
            border-radius: 36px;
            padding: 35px;
            animation: fadeIn .4s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #detail video {
            width: 100%;
            height: 700px;
            display: block;
            object-fit: cover;
            border-radius: 22px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, .08);
            box-shadow: 0 12px 35px rgba(0, 0, 0, .45);
        }

        #detail h2 {
            font-size: 36px;
            font-weight: 800;
            margin: 20px 0 10px;
            background: linear-gradient(135deg, #fff, #cfcfe6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #detail p {
            line-height: 2;
            color: #cfcfe6;
            font-size: 18px;
            font-weight: 300;
        }

        .detail-actions {
            display: flex;
            gap: 16px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            background: #ff5f5f;
            color: #fff;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            transition: all .3s ease;
            font-size: 17px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 25px -5px rgba(255, 95, 95, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            background: #ff3030;
            box-shadow: 0 12px 30px -5px rgba(255, 48, 48, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .btn-success {
            background: linear-gradient(135deg, #6bcb77, #4d96ff);
            box-shadow: 0 8px 25px -5px rgba(77, 150, 255, 0.3);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #5abf68, #3d8af0);
        }

        .btn-share {
            background: linear-gradient(135deg, #9b59b6, #4d96ff);
            box-shadow: 0 8px 25px -5px rgba(155, 89, 182, 0.3);
        }

        .btn-share:hover {
            background: linear-gradient(135deg, #8e44ad, #3d8af0);
        }

        .btn-copy-link {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            box-shadow: 0 8px 25px -5px rgba(243, 156, 18, 0.3);
        }

        .btn-copy-link:hover {
            background: linear-gradient(135deg, #e67e22, #d35400);
            box-shadow: 0 12px 30px -5px rgba(243, 156, 18, 0.5);
        }

        .no-video {
            padding: 80px 35px;
            text-align: center;
            border-radius: 30px;
            background: rgba(255, 255, 255, .05);
            border: 1px dashed rgba(255, 255, 255, .12);
            color: #bdbdd8;
            font-size: 22px;
        }

        .no-video span {
            display: block;
            font-size: 70px;
            margin-bottom: 20px;
        }

        .btn-watch-all {
            display: block;
            margin: 0 auto 40px;
            background: linear-gradient(135deg, #6bcb77, #4d96ff);
            color: #fff;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 700;
            transition: all .3s ease;
            box-shadow: 0 10px 35px -5px rgba(77, 150, 255, 0.3);
            text-align: center;
        }

        .btn-watch-all:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 45px -5px rgba(77, 150, 255, 0.5);
        }

        #videoLibrary {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, .92);
            backdrop-filter: blur(20px);
            padding: 40px 20px;
            overflow-y: auto;
            animation: modalFade .3s ease;
        }

        @keyframes modalFade {
            from {
                opacity: 0;
                transform: scale(.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #videoLibrary .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        #videoLibrary .modal-header h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #videoLibrary .modal-close {
            background: #ff5f5f;
            border: none;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all .3s ease;
        }

        #videoLibrary .modal-close:hover {
            transform: scale(1.05);
            background: #ff3030;
        }

        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .video-item {
            background: rgba(255, 255, 255, .06);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all .3s ease;
            border: 1px solid rgba(255, 255, 255, .08);
            display: flex;
            flex-direction: column;
        }

        .video-item:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, .2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .5);
        }

        .video-item .thumb {
            position: relative;
            height: 180px;
            overflow: hidden;
            background: #000;
        }

        .video-item .thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-item .thumb .play-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .4);
            font-size: 60px;
            opacity: 0;
            transition: opacity .3s ease;
        }

        .video-item:hover .thumb .play-icon {
            opacity: 1;
        }

        .video-item .info {
            padding: 18px 20px;
            text-align: center;
        }

        .video-item .info h4 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .video-item .info .play-btn-small {
            margin-top: 12px;
            background: linear-gradient(135deg, #4d96ff, #6bcb77);
            border: none;
            color: #fff;
            padding: 8px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all .3s ease;
        }

        .video-item .info .play-btn-small:hover {
            transform: scale(1.05);
        }

        #videoPlayerModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1100;
            background: rgba(0, 0, 0, .95);
            backdrop-filter: blur(20px);
            padding: 40px;
            align-items: center;
            justify-content: center;
        }

        #videoPlayerModal .player-wrapper {
            max-width: 900px;
            width: 100%;
            position: relative;
        }

        #videoPlayerModal .player-wrapper video {
            width: 100%;
            height: 550px;
            object-fit: contain;
            border-radius: 20px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .8);
        }

        #videoPlayerModal .player-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        #videoPlayerModal .player-close {
            background: #ff5f5f;
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all .3s ease;
        }

        #videoPlayerModal .player-close:hover {
            transform: scale(1.05);
            background: #ff3030;
        }

        #videoPlayerModal .player-title {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            background: rgba(0, 0, 0, .8);
            backdrop-filter: blur(12px);
            padding: 16px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, .1);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            transform: translateY(120px);
            opacity: 0;
            transition: all .5s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .5);
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        #toast .toast-icon {
            margin-left: 10px;
        }

        #shareModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, .85);
            backdrop-filter: blur(20px);
            padding: 30px;
            align-items: center;
            justify-content: center;
        }

        #shareModal .share-box {
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 40px 35px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, .5);
            animation: fadeInUp .4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #shareModal .share-box h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #shareModal .share-box .share-sub {
            text-align: center;
            color: #cfcfe6;
            font-size: 15px;
            opacity: .7;
            margin-bottom: 25px;
        }

        .share-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .share-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .05);
            cursor: pointer;
            transition: all .3s ease;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
        }

        .share-btn:hover {
            transform: translateY(-4px) scale(1.04);
            border-color: rgba(255, 255, 255, .2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .3);
        }

        .share-btn .icon {
            font-size: 36px;
        }

        .share-btn.ita {
            background: rgba(107, 203, 119, .15);
            border-color: rgba(107, 203, 119, .2);
        }

        .share-btn.ita:hover {
            background: rgba(107, 203, 119, .25);
        }

        .share-btn.telegram {
            background: rgba(77, 150, 255, .15);
            border-color: rgba(77, 150, 255, .2);
        }

        .share-btn.telegram:hover {
            background: rgba(77, 150, 255, .25);
        }

        .share-btn.whatsapp {
            background: rgba(37, 211, 102, .15);
            border-color: rgba(37, 211, 102, .2);
        }

        .share-btn.whatsapp:hover {
            background: rgba(37, 211, 102, .25);
        }

        .share-btn.copy {
            background: rgba(255, 215, 0, .15);
            border-color: rgba(255, 215, 0, .2);
        }

        .share-btn.copy:hover {
            background: rgba(255, 215, 0, .25);
        }

        .share-btn.twitter {
            background: rgba(29, 161, 242, .15);
            border-color: rgba(29, 161, 242, .2);
        }

        .share-btn.twitter:hover {
            background: rgba(29, 161, 242, .25);
        }

        .share-btn.facebook {
            background: rgba(24, 119, 242, .15);
            border-color: rgba(24, 119, 242, .2);
        }

        .share-btn.facebook:hover {
            background: rgba(24, 119, 242, .25);
        }

        .share-close {
            display: block;
            width: 100%;
            margin-top: 18px;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, .08);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s ease;
            border: 1px solid rgba(255, 255, 255, .06);
        }

        .share-close:hover {
            background: rgba(255, 255, 255, .15);
            transform: scale(1.02);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stats-bar .stat-item {
            text-align: center;
            background: rgba(255, 255, 255, .05);
            padding: 10px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, .06);
        }

        .stats-bar .stat-item .number {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar .stat-item .label {
            font-size: 14px;
            color: #cfcfe6;
            opacity: .7;
        }

        @media(max-width:700px) {
            h1 {
                font-size: 34px;
            }

            .subtitle {
                font-size: 17px;
                margin-bottom: 20px;
            }

            .btn-watch-all {
                font-size: 16px;
                padding: 14px 30px;
                margin-bottom: 30px;
            }

            .card-img-wrap {
                height: 200px;
            }

            .gallery {
                gap: 18px;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }

            #detail {
                padding: 20px;
            }

            #detail h2 {
                font-size: 28px;
            }

            #detail p {
                font-size: 16px;
            }

            .btn {
                padding: 12px 25px;
                font-size: 15px;
                width: 100%;
                justify-content: center;
            }

            .detail-actions {
                flex-direction: column;
            }

            #detail video {
                height: 400px;
            }

            #videoLibrary .modal-header h2 {
                font-size: 24px;
            }

            .video-list {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 18px;
            }

            .video-item .thumb {
                height: 130px;
            }

            #videoPlayerModal {
                padding: 20px;
            }

            #videoPlayerModal .player-wrapper video {
                height: 300px;
            }

            .stats-bar {
                gap: 15px;
            }

            .stats-bar .stat-item {
                padding: 8px 15px;
            }

            .stats-bar .stat-item .number {
                font-size: 20px;
            }

            #toast {
                right: 15px;
                left: 15px;
                bottom: 15px;
                font-size: 14px;
                padding: 14px 20px;
            }

            #shareModal .share-box {
                padding: 30px 20px;
            }

            .share-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width:480px) {
            .card-img-wrap {
                height: 160px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 12px;
            }

            .card h3 {
                font-size: 15px;
                padding: 14px 10px;
            }

            #detail video {
                height: 280px;
            }

            #videoLibrary {
                padding: 20px 12px;
            }

            .video-list {
                grid-template-columns: 1fr;
            }

            #videoPlayerModal .player-wrapper video {
                height: 220px;
            }

            .share-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .share-btn .icon {
                font-size: 28px;
            }

            .share-btn {
                font-size: 12px;
                padding: 12px 8px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>✨ Krackter Anime ✨</h1>

        <p class="subtitle">
            ★ <span>۶</span> شخصیت محبوب انیمه‌ای ★
        </p>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="number" id="totalViews">0</div>
                <div class="label">بازدید کل</div>
            </div>
            <div class="stat-item">
                <div class="number">۶</div>
                <div class="label">شخصیت‌ها</div>
            </div>
        </div>

        <button class="btn-watch-all" onclick="openVideoLibrary()">
            🎬 مشاهده همه ویدیوها
        </button>

        <div id="gallery" class="gallery">

            <div class="card" onclick="showDetail(0)">
                <div class="card-img-wrap">
                    <img src="ff/tangiro.jpg" alt="تانجیرو کامادو">
                </div>
                <h3>تانجیرو کامادو</h3>
            </div>

            <div class="card" onclick="showDetail(1)">
                <div class="card-img-wrap">
                    <img src="ff/h(2).jfif" alt="ایزوکو مدوریا">
                </div>
                <h3>ایزوکو مدوریا</h3>
            </div>

            <div class="card" onclick="showDetail(2)">
                <div class="card-img-wrap">
                    <img src="ff/download.jfif" alt="یوجی ایتادوری">
                </div>
                <h3>یوجی ایتادوری</h3>
            </div>

            <div class="card" onclick="showDetail(3)">
                <div class="card-img-wrap">
                    <img src="ff/images (1).jfif" alt="هیناتا شویو">
                </div>
                <h3>هیناتا شویو</h3>
            </div>

            <div class="card" onclick="showDetail(4)">
                <div class="card-img-wrap">
                    <img src="ff/httpsi.pinimg.com736x3d8ce83d8ce84f47b37d76dc4f53fd0b0f79f0.jpg" alt="ساسوکه اوچیها">
                </div>
                <h3>ساسوکه اوچیها</h3>
            </div>

            <div class="card" onclick="showDetail(5)">
                <div class="card-img-wrap">
                    <img src="ff/download (1).jfif" alt="ساتورو گوجو">
                </div>
                <h3>ساتورو گوجو</h3>
            </div>

        </div>

        <div id="detail">

            <div id="videoContainer"></div>

            <h2 id="detailTitle"></h2>
            <p id="detailStory"></p>

            <div class="detail-actions">
                <button class="btn" onclick="backGallery()">🔙 بازگشت</button>
                <button class="btn btn-secondary" onclick="backGallery()">✨ کارت‌ها</button>
                <button class="btn btn-success" onclick="openFullVideo()">🎬 بزرگ</button>
                <button class="btn btn-share" onclick="openShareModal()">📤 اشتراک</button>
                <button class="btn btn-copy-link" onclick="copySiteLink()">🔗 کپی لینک</button>
            </div>

        </div>

    </div>

    <!-- شریت مودال -->
    <div id="shareModal">
        <div class="share-box">
            <h2>📤 اشتراک‌گذاری</h2>
            <p class="share-sub" id="shareCharName">اشتراک‌گذاری شخصیت</p>
            <div class="share-grid">
                <button class="share-btn ita" onclick="shareTo('ita')">
                    <span class="icon">🟢</span>
                    <span>ایتا</span>
                </button>
                <button class="share-btn telegram" onclick="shareTo('telegram')">
                    <span class="icon">✈️</span>
                    <span>تلگرام</span>
                </button>
                <button class="share-btn whatsapp" onclick="shareTo('whatsapp')">
                    <span class="icon">💚</span>
                    <span>واتساپ</span>
                </button>
                <button class="share-btn copy" onclick="shareTo('copy')">
                    <span class="icon">📋</span>
                    <span>کپی متن</span>
                </button>
                <button class="share-btn twitter" onclick="shareTo('twitter')">
                    <span class="icon">🐦</span>
                    <span>توییتر</span>
                </button>
                <button class="share-btn facebook" onclick="shareTo('facebook')">
                    <span class="icon">👍</span>
                    <span>فیسبوک</span>
                </button>
            </div>
            <button class="share-close" onclick="closeShareModal()">✖ بستن</button>
        </div>
    </div>

    <!-- کتابخانه ویدیو -->
    <div id="videoLibrary">
        <div class="modal-header">
            <h2>🎬 کتابخانه ویدیوها</h2>
            <button class="modal-close" onclick="closeVideoLibrary()">✖ بستن</button>
        </div>
        <div id="videoListContainer" class="video-list"></div>
    </div>

    <!-- پلیر ویدیو -->
    <div id="videoPlayerModal">
        <div class="player-wrapper">
            <video id="libraryPlayer" controls autoplay playsInline>
                <source src="" type="video/mp4">
            </video>
            <div class="player-controls">
                <button class="player-close" onclick="closePlayerModal()">✖ بستن</button>
                <span class="player-title" id="playerTitle">عنوان</span>
            </div>
        </div>
    </div>

    <!-- توست -->
    <div id="toast">
        <span class="toast-icon">✅</span>
        <span id="toastMessage"></span>
    </div>

    <script>
        // =============================================
        // 🌐 لینک سایت - بعد از آپلود تغییر بده
        // =============================================
        // 🔴 اینجا آدرس سایتت رو بعد از آپلود بذار:
        var SITE_URL = 'https://krackter-anime.vercel.app'; // ← لینک جدیدت رو بذار
        // اگر هنوز آپلود نکردی، از آدرس فعلی استفاده کن
        if (window.location.protocol === 'file:') {
            SITE_URL = window.location.href;
            console.log('⚠️ فایل به صورت محلی باز شده! برای استفاده در موبایل آپلود کن.');
            console.log('📌 راهنما: https://vercel.com یا https://netlify.com');
        }

        console.log('🌐 لینک سایت: ' + SITE_URL);

        // =============================================
        // DATA
        // =============================================
        var characters = [{
            name: "تانجیرو کامادو",
            video: "videos/video_2026-07-01_22-24-08.mp4",
            story: "تانجیرو پس از قتل خانواده‌اش توسط شیاطین، تصمیم می‌گیرد به یک شیطان‌کش تبدیل شود تا خواهرش نزوکو را دوباره به انسان تبدیل کند."
        }, {
            name: "ایزوکو مدوریا",
            video: "videos/video_2026-07-01_22-44-42.mp4",
            story: "مدوریا در ابتدا هیچ قدرتی نداشت اما با تلاش فراوان موفق شد قدرت One For All را به دست آورد و در مسیر تبدیل شدن به بزرگ‌ترین قهرمان جهان قدم بگذارد."
        }, {
            name: "یوجی ایتادوری",
            video: "videos/video_2026-07-01_23-18-04.mp4",
            story: "یوجی ایتادوری پس از بلعیدن انگشت سوکونا وارد دنیای جوجوتسو می‌شود. او با وجود قدرت فوق‌العاده‌اش، قلبی مهربان دارد و برای نجات انسان‌ها مبارزه می‌کند."
        }, {
            name: "هیناتا شویو",
            video: "videos/video_2026-07-01_22-44-51.mp4",
            story: "هیناتا با وجود قد کوتاهش، با پشتکار و پرش‌های خارق‌العاده به یکی از بهترین بازیکنان والیبال تبدیل می‌شود."
        }, {
            name: "ساسوکه اوچیها",
            video: "videos/video_2026-07-01_21-40-20.mp4",
            story: "ساسوکه آخرین بازمانده خاندان اوچیهاست. او برای انتقام از برادرش وارد مسیر تاریکی می‌شود اما در نهایت معنای واقعی دوستی و فداکاری را درک می‌کند."
        }, {
            name: "ساتورو گوجو",
            video: "videos/16277.mp4",
            story: "گوجو قوی‌ترین جادوگر جوجوتسو است. قدرت بی‌نظیر، شخصیت شوخ‌طبع و علاقه او به شاگردانش باعث شده یکی از محبوب‌ترین شخصیت‌های دنیای انیمه باشد."
        }];

        var currentIndex = 0;
        var viewCounts = {};
        var toastTimeout;

        // =============================================
        // VIEW COUNTS
        // =============================================
        try {
            var saved = localStorage.getItem('animeViews');
            if (saved) viewCounts = JSON.parse(saved);
        } catch (e) { }

        function updateTotalViews() {
            var total = 0;
            for (var key in viewCounts) total += viewCounts[key];
            document.getElementById('totalViews').textContent = total;
        }
        updateTotalViews();

        function incrementView(index) {
            viewCounts[index] = (viewCounts[index] || 0) + 1;
            try {
                localStorage.setItem('animeViews', JSON.stringify(viewCounts));
            } catch (e) { }
            updateTotalViews();
        }

        // =============================================
        // TOAST
        // =============================================
        function showToast(message, icon) {
            icon = icon || '✅';
            var toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.querySelector('.toast-icon').textContent = icon;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function () {
                toast.classList.remove('show');
            }, 3000);
        }

        // =============================================
        // 📋 کپی لینک سایت
        // =============================================
        function copySiteLink() {
            var link = SITE_URL;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(link).then(function () {
                    showToast('لینک سایت کپی شد! 📋', '🔗');
                }).catch(function () {
                    copyFallback(link);
                });
            } else {
                copyFallback(link);
            }
        }

        function copyFallback(text) {
            try {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('کپی شد! 📋', '✅');
            } catch (e) {
                showToast('لطفاً دستی کپی کنید', '📝');
            }
        }

        // =============================================
        // MAIN FUNCTIONS
        // =============================================
        function showDetail(index) {
            currentIndex = index;
            var char = characters[index];
            incrementView(index);

            document.getElementById('gallery').style.display = 'none';
            document.getElementById('detail').style.display = 'block';

            var container = document.getElementById('videoContainer');
            container.innerHTML = '';

            var video = document.createElement('video');
            video.src = char.video;
            video.controls = true;
            video.autoplay = true;
            video.muted = false;
            video.loop = false;
            video.style.width = '100%';
            video.style.height = '700px';
            video.style.objectFit = 'cover';
            video.style.borderRadius = '20px';
            video.style.marginBottom = '20px';
            video.style.background = '#000';

            video.onerror = function () {
                this.style.display = 'none';
                var msg = document.createElement('div');
                msg.className = 'no-video';
                msg.innerHTML = '<span>🎬</span> ویدیو پیدا نشد';
                container.appendChild(msg);
            };

            container.appendChild(video);

            document.getElementById('detailTitle').innerText = char.name;
            document.getElementById('detailStory').innerText = char.story;

            window.scrollTo({ top: 0, behavior: 'smooth' });
            showToast('در حال پخش ' + char.name, '🎬');
        }

        function backGallery() {
            document.getElementById('detail').style.display = 'none';
            document.getElementById('gallery').style.display = 'grid';

            var container = document.getElementById('videoContainer');
            var video = container.querySelector('video');
            if (video) {
                video.pause();
                video.currentTime = 0;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openFullVideo() {
            var char = characters[currentIndex];
            var modal = document.getElementById('videoPlayerModal');
            var player = document.getElementById('libraryPlayer');
            var title = document.getElementById('playerTitle');

            player.src = char.video;
            player.load();
            title.textContent = '🎥 ' + char.name;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            player.play();
            showToast('در حال پخش در تمام صفحه', '📺');
        }

        // =============================================
        // SHARE FUNCTIONS
        // =============================================

        function openShareModal() {
            var char = characters[currentIndex];
            document.getElementById('shareCharName').textContent = 'اشتراک‌گذاری "' + char.name + '"';
            document.getElementById('shareModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeShareModal() {
            document.getElementById('shareModal').style.display = 'none';
            document.body.style.overflow = '';
        }

        function shareTo(platform) {
            var char = characters[currentIndex];
            var text = '🎬 ' + char.name + '\n📖 ' + char.story + '\n\n✨ از گالری Krackter Anime دیدن کنید!';
            var url = SITE_URL;
            var shareUrl = '';

            switch (platform) {
                case 'ita':
                    shareUrl = 'https://ita.ir/?text=' + encodeURIComponent(text + '\n' + url);
                    break;
                case 'telegram':
                    shareUrl = 'https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(
                        text);
                    break;
                case 'whatsapp':
                    shareUrl = 'https://wa.me/?text=' + encodeURIComponent(text + '\n' + url);
                    break;
                case 'twitter':
                    shareUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' +
                        encodeURIComponent(url);
                    break;
                case 'facebook':
                    shareUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url) + '&quote=' +
                        encodeURIComponent(text);
                    break;
                case 'copy':
                    try {
                        var fullText = text + '\n' + url;
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(fullText).then(function () {
                                showToast('متن کپی شد! 📋', '📋');
                            }).catch(function () {
                                copyFallback(fullText);
                            });
                        } else {
                            copyFallback(fullText);
                        }
                    } catch (e) {
                        copyFallback(text + '\n' + url);
                    }
                    closeShareModal();
                    return;
                default:
                    showToast('پلتفرم مورد نظر پشتیبانی نمی‌شود', '⚠️');
                    return;
            }

            if (shareUrl) {
                window.open(shareUrl, '_blank');
                var names = {
                    'ita': 'ایتا',
                    'telegram': 'تلگرام',
                    'whatsapp': 'واتساپ',
                    'twitter': 'توییتر',
                    'facebook': 'فیسبوک'
                };
                showToast('در حال باز کردن ' + (names[platform] || platform) + ' ...', '📤');
                setTimeout(closeShareModal, 500);
            }
        }

        document.getElementById('shareModal').addEventListener('click', function (e) {
            if (e.target === this) closeShareModal();
        });

        // =============================================
        // VIDEO LIBRARY
        // =============================================
        function openVideoLibrary() {
            var library = document.getElementById('videoLibrary');
            var container = document.getElementById('videoListContainer');
            container.innerHTML = '';

            for (var i = 0; i < characters.length; i++) {
                var char = characters[i];
                var item = document.createElement('div');
                item.className = 'video-item';

                item.innerHTML = `
                    <div class="thumb">
                        <video muted preload="metadata">
                            <source src="${char.video}" type="video/mp4">
                        </video>
                        <div class="play-icon">▶️</div>
                    </div>
                    <div class="info">
                        <h4>${char.name}</h4>
                        <button class="play-btn-small" onclick="playFromLibrary(${i})">▶ پخش</button>
                    </div>
                `;

                item.addEventListener('click', function (e) {
                    if (!e.target.closest('.play-btn-small')) {
                        var idx = parseInt(this.dataset.index);
                        playFromLibrary(idx);
                    }
                });
                item.dataset.index = i;
                container.appendChild(item);
            }

            library.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeVideoLibrary() {
            document.getElementById('videoLibrary').style.display = 'none';
            document.body.style.overflow = '';
        }

        function playFromLibrary(index) {
            var char = characters[index];
            var modal = document.getElementById('videoPlayerModal');
            var player = document.getElementById('libraryPlayer');
            var title = document.getElementById('playerTitle');

            incrementView(index);

            player.src = char.video;
            player.load();
            title.textContent = '🎥 ' + char.name;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            player.play();
            showToast('در حال پخش ' + char.name, '🎬');
            closeVideoLibrary();
        }

        function closePlayerModal() {
            var modal = document.getElementById('videoPlayerModal');
            var player = document.getElementById('libraryPlayer');
            player.pause();
            player.currentTime = 0;
            player.src = '';
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }

        // =============================================
        // KEYBOARD SHORTCUTS
        // =============================================
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                if (document.getElementById('shareModal').style.display === 'flex') {
                    closeShareModal();
                } else if (document.getElementById('videoPlayerModal').style.display === 'flex') {
                    closePlayerModal();
                } else if (document.getElementById('videoLibrary').style.display === 'block') {
                    closeVideoLibrary();
                }
            }
        });

        document.getElementById('videoLibrary').addEventListener('click', function (e) {
            if (e.target === this) closeVideoLibrary();
        });

        document.getElementById('videoPlayerModal').addEventListener('click', function (e) {
            if (e.target === this) closePlayerModal();
        });

        // =============================================
        // SECURITY
        // =============================================
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'F12' || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });

        console.log('🔥 Krackter Anime - گالری انیمه');
        console.log('🌐 لینک سایت: ' + SITE_URL);
        console.log('');
        console.log('📌 IMPORTANT:');
        console.log('   اگر این خطا را می‌بینی: ERR_CONNECTION_CLOSED');
        console.log('   یعنی فایل روی کامپیوتر لوکال هست و گوشی نمیتونه بهش دسترسی داشته باشه.');
        console.log('');
        console.log('✅ راه حل:');
        console.log('   1. برو به https://vercel.com');
        console.log('   2. ثبت‌نام کن');
        console.log('   3. فایل رو آپلود کن');
        console.log('   4. لینک دریافت کن و توی SITE_URL بذار');
        console.log('');
        console.log('✨ از تماشا لذت ببرید!');
    </script>

</body>

</html>
